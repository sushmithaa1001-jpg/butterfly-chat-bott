<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤩 Butterfly AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>
<body>
    <!--Background Blobs-->
    <div class="blop blob1"></div>
    <div class="blop blob2"></div>
    <div class="blop blob3"></div>
    <div class="blop blob4"></div>
    <div class="blop blob5"></div>
    <!--Fireflies-->
    <div> id="particles"</div>
    <!--Butterflies-->
    <div class="butterfly butterfly1">🤩</div>
    <div class="butterfly butterfly2">🤩</div>
    <div class="butterfly butterfly3">🤩</div>
    <div class="butterfly butterfly4">🤩</div>
    <div class="butterfly butterfly5">🤩</div>
    <!--Main Container-->
    <div class="chat-container">
        <!--Heading-->
        <h1>🤩 Butterfly AI</h1>
        <p>You Pookie Intelligent Assistant </p>
        <div class="status">
            >Online
        </div>
        <div id="modeIndicator">
            Current Mode: Normal
        </div>
    </div>
    <!--Prompt Button-->
    <div class="prompt-bar">
        <button class="prompt-btn" onclick="setMode('coding')">
            Coding 
        </button>

        <button class="prompt-btn" onclick="setMode('study')">
            Study 
        </button>

        <button class="prompt-btn" onclick="setMode('interview')">
            Interview 
        </button>

        <button class="prompt-btn" onclick="setMode('content')">
            Content 
        </button>

        <button class="prompt-btn" onclick="setMode('resume')">
            Resume  
        </button>
    </div>
    <!--Chat Message-->
    <div class="chat-box" id="chatBox">
        <div class="bot-message">
             hey yo I'm coolbott, wasssupp???
        </div>
    </div>
    <!--Input Area-->
    <div class="input-area">
        <input type="text"
        id="userInput"
        placeholder="Ask coolbott anything..."
        autocomplete="off"
        onkeypress="handleKey(event)"
        >
        <button onclick="sendMessage()">
            Send :]
        </button>
        </div>
    </div>
    <script src="{{url_for('static', filename='script.js' )}}"></script>   
</body>
</html>
